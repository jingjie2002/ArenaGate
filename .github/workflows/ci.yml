name: ArenaGate CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
          cache: false
      - name: Run tests
        run: go test ./...
      - name: Run go vet
        run: go vet ./...
      - name: Build gateway
        run: go build ./cmd/gateway
